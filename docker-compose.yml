version: '3.9'

services:
  fastapi:
    build: .
    container_name: churn-fastapi
    ports:
      - "8000:8000"

  streamlit:
    build: .
    container_name: churn-streamlit
    working_dir: /app
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    depends_on:
      - fastapi