name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check required files
        run: |
          [ -f app.py ] || (echo "app.py not found" && exit 1)
          [ -f main.py ] || (echo "main.py not found" && exit 1)
          [ -f requirements.txt ] || (echo "requirements.txt not found" && exit 1)
          [ -f Dockerfile ] || (echo "Dockerfile not found" && exit 1)
          [ -f docker-compose.yml ] || (echo "docker-compose.yml not found" && exit 1)

      - name: Check Python syntax
        run: |
          python -m py_compile app.py
          python -m py_compile main.py

      - name: Build Docker services
        run: docker compose build